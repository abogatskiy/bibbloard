name: Weekly data refresh

on:
  schedule:
    - cron: '0 22 * * 5'  # Every Friday at 22:00 UTC (6pm ET / 3pm PT)
  workflow_dispatch:        # Manual trigger from GitHub Actions UI

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install scraper dependency
        run: pip3 install billboard.py

      - name: Fetch latest chart data
        run: python3 fetch_genre_updates.py --all

      - name: Regenerate JSON data
        run: python3 bibbloard.py

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/ data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: weekly data refresh $(date -u +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Build multi-platform ARM64 image and push to GHCR
      - name: Set up QEMU
        if: steps.commit.outputs.changed == 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: steps.commit.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.commit.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: abogatskiy
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push ARM64 image
        if: steps.commit.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/abogatskiy/billboard-web:latest

      # Connect to Tailscale so we can reach the Pi
      - name: Connect to Tailscale
        if: steps.commit.outputs.changed == 'true'
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions
          args: --accept-dns=false

      # Pull new image on Pi and restart the container
      - name: Deploy to Pi
        if: steps.commit.outputs.changed == 'true'
        run: |
          echo "${{ secrets.PI_SSH_KEY }}" > /tmp/pi_key
          chmod 600 /tmp/pi_key
          ssh -i /tmp/pi_key -o StrictHostKeyChecking=no ${{ secrets.PI_HOST }} '
            docker pull ghcr.io/abogatskiy/billboard-web:latest
            docker stop billboard-web 2>/dev/null || true
            docker rm   billboard-web 2>/dev/null || true
            docker run -d --name billboard-web \
              --network nginx_proxy-network \
              --restart unless-stopped \
              ghcr.io/abogatskiy/billboard-web:latest
          '
          rm /tmp/pi_key
